name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node 22 across the board: CoreTex uses Node 22 for the pinned launch toolchain.
env:
  NODE_VERSION: "22"

# Obsolete legacy matrix jobs were removed after they stopped exercising live
# code paths. Python parity coverage lives in python-tests below.

jobs:
  lint-type-unit:
    name: Lint + Type + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run version:check --workspace @botcoin/coretex
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm run build --if-present
      - run: npm run test:unit --if-present

  python-tests:
    name: Python cross-impl parity (coretex-py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python coretex-py deps
        run: pip install pycryptodome pytest
      - name: Python unit tests
        run: python3 -m pytest packages/coretex-py/coretex_py/tests/ -v

  contracts:
    name: Contracts (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build --root contracts --sizes
      - run: forge test --root contracts -vv
