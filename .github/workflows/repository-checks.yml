name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks + TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan Git history with gitleaks
        run: gitleaks detect --source . --redact --no-banner --verbose

      - name: Install TruffleHog
        run: |
          curl -sSfL https://github.com/trufflesecurity/trufflehog/releases/download/v3.95.5/trufflehog_3.95.5_linux_amd64.tar.gz \
            | tar -xz trufflehog
          sudo install -m 0755 trufflehog /usr/local/bin/trufflehog

      - name: Scan Git history with TruffleHog
        run: trufflehog git "file://${PWD}" --only-verified --fail --no-update
