name: CoreTex Release

on:
  push:
    tags:
      - "coretex-v*"

permissions:
  contents: write

jobs:
  release-coretex-package:
    name: Build and publish CoreTex package artifacts
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package/runtime version sync
        run: npm run version:check --workspace @botcoin/coretex

      - name: Build workspace
        run: npm run build

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/coretex/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#coretex-v}"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "tag/version mismatch: tag=${TAG_VERSION} package=${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Assemble release artifacts
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/coretex-client-${GITHUB_REF_NAME}.tgz \
            packages/coretex/dist \
            packages/coretex/package.json \
            packages/coretex/README.md
          cp packages/coretex/dist/replay-cli.js release-artifacts/coretex-replay.js
          cp packages/coretex/dist/cli.js release-artifacts/botcoin-coretex.js
          node scripts/build-coretex-release-manifest.mjs release-artifacts
          sha256sum release-artifacts/coretex-client-${GITHUB_REF_NAME}.tgz \
            release-artifacts/coretex-replay.js \
            release-artifacts/botcoin-coretex.js \
            release-artifacts/coretex-release-manifest.json \
            > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release-artifacts/coretex-client-${{ github.ref_name }}.tgz
            release-artifacts/coretex-replay.js
            release-artifacts/botcoin-coretex.js
            release-artifacts/SHA256SUMS.txt
            release-artifacts/coretex-release-manifest.json
