name: CoreTex Release

on:
  push:
    tags:
      - "coretex-v*"

permissions:
  contents: write

jobs:
  release-coretex-client:
    name: Build and publish CoreTex client artifacts
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Verify tag matches client version constant
        run: |
          CLIENT_VERSION=$(node -e "const fs=require('fs');const s=fs.readFileSync('packages/cortex/src/version.ts','utf8');const m=s.match(/CORTEX_CLIENT_VERSION\\s*=\\s*'([^']+)'/);if(!m)process.exit(1);process.stdout.write(m[1]);")
          TAG_VERSION="${GITHUB_REF_NAME#coretex-v}"
          if [ "${CLIENT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "tag/version mismatch: tag=${TAG_VERSION} client=${CLIENT_VERSION}"
            exit 1
          fi

      - name: Assemble release artifacts
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/coretex-client-${GITHUB_REF_NAME}.tgz \
            packages/cortex/dist \
            packages/cortex/package.json \
            packages/cortex/README.md
          cp packages/cortex/dist/replay-cli.js release-artifacts/coretex-replay.js
          cp packages/cortex/dist/cli.js release-artifacts/botcoin-cortex.js
          node scripts/build-coretex-release-manifest.mjs release-artifacts
          sha256sum release-artifacts/coretex-client-${GITHUB_REF_NAME}.tgz \
            release-artifacts/coretex-replay.js \
            release-artifacts/botcoin-cortex.js \
            release-artifacts/coretex-release-manifest.json \
            > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release-artifacts/coretex-client-${{ github.ref_name }}.tgz
            release-artifacts/coretex-replay.js
            release-artifacts/botcoin-cortex.js
            release-artifacts/SHA256SUMS.txt
            release-artifacts/coretex-release-manifest.json
