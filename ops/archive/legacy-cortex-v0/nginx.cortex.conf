# Botcoin Cortex — nginx upstream snippet.
# Include from inside the existing coordinator.agentmoney.net server block:
#     include snippets/cortex.conf;
#
# Path-prefix routing only. A ?lane=cortex query string MUST NOT reach this
# upstream — that is verified by the Phase 5 path-routing isolation E2E test.

upstream cortex_server {
    # cortex-server runs as its own process (own PID, own SQLite, own worker pool).
    server 127.0.0.1:8081;
    keepalive 32;
}

# ---- Cortex lane endpoints ----
location ^~ /v1/cortex/ {
    proxy_pass         http://cortex_server;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # Worker pool absorbs eval load — request thread should never block,
    # but cap submit body size as a defence-in-depth.
    client_max_body_size 256k;
}

# Internal-only health check.
location = /v1/cortex/_healthz {
    proxy_pass http://cortex_server/healthz;
    access_log off;
}
