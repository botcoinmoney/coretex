# Prometheus scrape config — testnet
#
# Drop into your Prometheus configuration as a scrape_configs entry. The
# cortex-server /metrics endpoint is a V1 deliverable (see docs/v1-roadmap.md
# §9). Until then, this file is a template — Prometheus will report the
# target as down.

scrape_configs:
  - job_name: cortex-server-testnet
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - cortex-server-testnet.internal:8081
        labels:
          environment: testnet
          service: cortex-server

  - job_name: cortex-coordinator-testnet
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - swcp-coordinator-testnet.internal:8080
        labels:
          environment: testnet
          service: swcp-coordinator
