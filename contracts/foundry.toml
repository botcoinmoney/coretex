[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
test        = "test"
script      = "script"
solc        = "0.8.26"
optimizer   = true
optimizer_runs = 200
via_ir      = false
verbosity   = 2
gas_reports = ["CortexRegistry", "CortexMergeBonus"]

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 64 }
